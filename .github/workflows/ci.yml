name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          # generate needs the var to exist; it does not connect.
          DATABASE_URL: mysql://user:pass@localhost:3306/db
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://user:pass@localhost:3306/db
      - run: npm run compile
